<h2>Web 控制台布局</h2>
<p class="subtitle">终端 + 文件管理器如何排布？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>侧边抽屉</h3>
      <p>终端全屏占据主区域，文件管理器从侧边滑出，类似 VS Code 的文件浏览器。空间利用率高，文件操作不打断终端工作流。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>左右分屏</h3>
      <p>终端和文件管理器始终并排显示。适合频繁在两者之间切换的场景，但各自空间被压缩。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>标签页切换</h3>
      <p>顶部标签在"终端"和"文件"之间切换，各自全屏。简单清晰，但无法同时查看终端和文件。</p>
    </div>
  </div>
</div>

<h3 style="margin-top: 2rem;">推荐：A（侧边抽屉）</h3>
<p>终端是核心交互区域，文件管理是辅助功能。抽屉式设计让文件管理不占用终端空间，需要时一键打开，用完即走。xterm.js 终端占满主区域，交互体验最好。</p>
